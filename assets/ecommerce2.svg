<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes gradientBG {
      0% { stop-color: #ff007f; }
      50% { stop-color: #7928ca; }
      100% { stop-color: #ff007f; }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-2px); }
      100% { transform: translateY(0px); }
    }
    @keyframes pulse {
      0% { opacity: 0.8; }
      50% { opacity: 1; }
      100% { opacity: 0.8; }
    }
    .bg { fill: #0d1117; stroke: url(#grad); stroke-width: 2; rx: 10; }
    .title { font-family: "Segoe UI", Ubuntu, sans-serif; font-weight: 700; font-size: 18px; fill: #58a6ff; animation: float 3s ease-in-out infinite; animation-delay: 2.5s; }
    .desc { font-family: "Segoe UI", Ubuntu, sans-serif; font-size: 13px; fill: #c9d1d9; }
    .icon { fill: #58a6ff; animation: pulse 2s infinite; }
    .stat { font-family: "Segoe UI", Ubuntu, sans-serif; font-size: 12px; fill: #8b949e; }
  </style>
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7928ca">
        <animate attributeName="stop-color" values="#7928ca;#ff007f;#7928ca" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#ff007f">
        <animate attributeName="stop-color" values="#ff007f;#7928ca;#ff007f" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="398" height="118" class="bg" />
  
  <svg x="15" y="20" width="16" height="16" viewBox="0 0 16 16" class="icon">
    <path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"></path>
  </svg>
  
  <text x="40" y="33" class="title">E-Commerce_Web</text>
  <text x="15" y="65" class="desc">Full-stack MERN E-Commerce Web App.</text>
  
  <circle cx="20" cy="95" r="6" fill="#f1e05a" />
  <text x="35" y="99" class="stat">JavaScript</text>
</svg>
