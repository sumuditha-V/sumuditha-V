<svg width="435" height="50" viewBox="0 0 435 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; filter: drop-shadow(0 0 4px rgba(254,66,142,0.6)); }
      100% { opacity: 0.7; }
    }
    .title { font-family: 'Segoe UI', Ubuntu, sans-serif; font-weight: 700; font-size: 24px; fill: #fe428e; animation: pulse 3s ease-in-out infinite; text-anchor: middle; animation-delay: 2s; }
  </style>
  <text x="217" y="35" class="title">📈 GitHub Stats</text>
</svg>
